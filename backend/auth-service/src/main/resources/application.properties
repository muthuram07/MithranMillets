spring.application.name=auth-service
server.port=8085
spring.datasource.url=jdbc:mysql://localhost:3306/authdb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

debug=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=muthuraman31.mdu@gmail.com
spring.mail.password=your_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# timeouts & debug (fail fast, useful logs)
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG

# --- Eureka Client Settings ---
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optional: prefer IP address instead of hostname (useful if hostname resolution fails)
eureka.instance.prefer-ip-address=true

# Optional: explicitly set instance ID (helps avoid conflicts if multiple services run on same host)
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Optional: health check URL (so Eureka knows if your service is healthy)
management.endpoints.web.exposure.include=health,info
eureka.instance.health-check-url-path=/actuator/health
