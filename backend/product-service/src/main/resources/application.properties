spring.application.name=product-service
server.port=${PORT:8081}


spring.datasource.url=jdbc:mysql://${DB_HOST:mithranmillets-muthuraman31-db0d.e.aivencloud.com}:${DB_PORT:24610}/productdb?sslMode=REQUIRED
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.hibernate.ddl-auto=update

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HikariCP settings (keep pool small to respect free-tier limits)
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


internal.auth.token=${INTERNAL_AUTH_TOKEN:local-development-token}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5174,https://mithran-frontend.onrender.com}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.enabled=${EUREKA_ENABLED:true}
jwt.secret=${JWT_SECRET}


